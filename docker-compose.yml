services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: warehouse-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: srvr
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep 'Mode:'"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: warehouse-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: warehouse-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      /bin/sh -c "
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic warehouse-events --partitions 3 --replication-factor 1 &&
      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic warehouse-events-dlq --partitions 3 --replication-factor 1
      "

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: warehouse-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_KAFKASTORE_TOPIC_REPLICATION_FACTOR: 1
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/subjects >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  cassandra:
    image: cassandra:4.1
    container_name: warehouse-cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: SmartWarehouseCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 8
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1 && nodetool netstats | grep -q 'Mode: NORMAL'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 90s

  cassandra-migrate:
    image: cassandra:4.1
    container_name: warehouse-cassandra-migrate
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/schema/init.cql:ro
    command: >
      /bin/sh -c "
      until cqlsh cassandra 9042 -e 'DESCRIBE KEYSPACES' >/dev/null 2>&1; do sleep 5; done &&
      cqlsh cassandra 9042 -f /schema/init.cql
      "

  wms:
    build: .
    container_name: warehouse-wms
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      WAREHOUSE_EVENTS_TOPIC: warehouse-events
    command: uvicorn wms_service.main:app --host 0.0.0.0 --port 8080
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8080/health\",timeout=2).status==200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 12

  consumer:
    build: .
    container_name: warehouse-consumer
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
      cassandra-migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      WAREHOUSE_EVENTS_TOPIC: warehouse-events
      WAREHOUSE_DLQ_TOPIC: warehouse-events-dlq
      KAFKA_CONSUMER_GROUP: warehouse-state-consumer
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: warehouse
      CASSANDRA_LOCAL_DC: datacenter1
      CASSANDRA_READ_CONSISTENCY: LOCAL_ONE
      CASSANDRA_WRITE_CONSISTENCY: LOCAL_ONE
      METRICS_PORT: 8000
    command: python -m consumer_service.main
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8000/health\",timeout=2).status==200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  lag-exporter:
    build: .
    container_name: warehouse-lag-exporter
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      WAREHOUSE_EVENTS_TOPIC: warehouse-events
      KAFKA_CONSUMER_GROUP: warehouse-state-consumer
      METRICS_PORT: 8001
    command: python -m consumer_service.lag_exporter
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:8001/health\",timeout=2).status==200 else 1)'"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: warehouse-kafka-exporter
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9308:9308"
    command:
      - --kafka.server=kafka:29092
      - --topic.filter=warehouse-events.*
      - --group.filter=warehouse-.*
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9308/metrics >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: warehouse-prometheus
    depends_on:
      consumer:
        condition: service_started
      lag-exporter:
        condition: service_started
      wms:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: warehouse-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 12

  grafana:
    image: grafana/grafana:10.4.2
    container_name: warehouse-grafana
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  cassandra_data:
