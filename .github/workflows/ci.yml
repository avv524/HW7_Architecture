name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.5.0
      - name: Ruff
        run: ruff check app consumer_service wms_service scripts tests --select=E,F,B --ignore=E501,B008
      - name: Compile all python files
        run: python -m compileall -q app consumer_service wms_service scripts tests

  unit-tests:
    runs-on: ubuntu-22.04
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: pytest tests/unit --maxfail=1 -q --junitxml=artifacts/unit-tests.xml
      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-tests-junit
          path: artifacts/unit-tests.xml

  build:
    runs-on: ubuntu-22.04
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build application image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: smart-warehouse:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-tests:
    runs-on: ubuntu-22.04
    needs: [unit-tests, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Start docker-compose stack
        run: |
          docker compose up -d --build --wait --wait-timeout 300
        env:
          COMPOSE_HTTP_TIMEOUT: "300"
      - name: Show running containers
        if: always()
        run: docker compose ps
      - name: Wait for services to be reachable
        run: |
          for url in \
            "http://localhost:8080/health" \
            "http://localhost:8000/health" \
            "http://localhost:9090/-/ready" \
            "http://localhost:9093/-/ready"
          do
            echo "Waiting for $url ..."
            for i in $(seq 1 60); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                echo "  ready"
                break
              fi
              sleep 5
              if [ "$i" = "60" ]; then
                echo "  FAILED to become ready"
                docker compose logs --tail=200
                exit 1
              fi
            done
          done
      - name: Run integration tests
        run: pytest tests/integration -v --maxfail=2 --junitxml=artifacts/integration-tests.xml
      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-tests-junit
          path: artifacts/integration-tests.xml
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=500
      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans

  e2e-and-load:
    runs-on: ubuntu-22.04
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
          k6 version
      - name: Start docker-compose stack
        run: |
          docker compose up -d --build --wait --wait-timeout 300
        env:
          COMPOSE_HTTP_TIMEOUT: "300"
      - name: Wait for services to be reachable
        run: |
          for url in \
            "http://localhost:8080/health" \
            "http://localhost:8000/health" \
            "http://localhost:9090/-/ready" \
            "http://localhost:9093/-/ready" \
            "http://localhost:9308/metrics"
          do
            echo "Waiting for $url ..."
            for i in $(seq 1 60); do
              if curl -fsS "$url" >/dev/null 2>&1; then
                echo "  ready"
                break
              fi
              sleep 5
              if [ "$i" = "60" ]; then
                echo "  FAILED to become ready"
                docker compose logs --tail=200
                exit 1
              fi
            done
          done

      - name: Run E2E tests
        run: pytest tests/e2e -v --maxfail=1 --junitxml=artifacts/e2e-tests.xml

      - name: Prepare load test artifacts dir
        run: mkdir -p artifacts

      - name: Run k6 load test
        run: |
          k6 run load/smoke.js \
            --summary-export=artifacts/k6-summary.json \
            -e WMS_URL=http://localhost:8080 \
            -e LOAD_DURATION=45s

      - name: Validate SLOs against Prometheus
        run: python scripts/check_slo.py --prom http://localhost:9090 --slo monitoring/slo.yml --wait 30

      - name: Check Prometheus has scraped HW7-required metrics
        run: |
          for metric in http_requests_total http_request_errors_total http_request_duration_seconds_bucket; do
            count=$(curl -fsS "http://localhost:9090/api/v1/query?query=${metric}" \
              | python -c "import sys,json; data=json.load(sys.stdin); print(len(data['data']['result']))")
            echo "$metric -> $count series"
            if [ "$count" -lt 1 ]; then
              echo "FAIL: no samples for $metric"
              exit 1
            fi
          done

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-and-load-artifacts
          path: |
            artifacts/
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=800
      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
