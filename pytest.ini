[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    integration: Integration tests requiring docker-compose stack to be running
    e2e: End-to-end tests requiring docker-compose stack to be running
    unit: Pure unit tests (default)
filterwarnings =
    ignore::DeprecationWarning:cassandra.*
    ignore::DeprecationWarning:fastapi.*
