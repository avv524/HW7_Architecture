global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: smart-warehouse
    env: ci

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: warehouse-wms
    metrics_path: /metrics
    static_configs:
      - targets:
          - wms:8080
        labels:
          service: wms

  - job_name: warehouse-consumer
    metrics_path: /metrics
    static_configs:
      - targets:
          - consumer:8000
        labels:
          service: consumer

  - job_name: warehouse-lag-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - lag-exporter:8001
        labels:
          service: lag-exporter

  - job_name: kafka-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - kafka-exporter:9308
        labels:
          service: kafka
