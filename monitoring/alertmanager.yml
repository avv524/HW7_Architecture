global:
  resolve_timeout: 1m

route:
  receiver: default
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h
  routes:
    - matchers:
        - severity = "critical"
      receiver: critical
      continue: true
    - matchers:
        - severity = "warning"
      receiver: warnings

receivers:
  - name: default
    webhook_configs:
      - url: http://alertmanager:9093/api/v2/alerts
        send_resolved: false

  - name: critical
    webhook_configs:
      - url: http://alertmanager:9093/api/v2/alerts
        send_resolved: false

  - name: warnings
    webhook_configs:
      - url: http://alertmanager:9093/api/v2/alerts
        send_resolved: false

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['service', 'alertname']
